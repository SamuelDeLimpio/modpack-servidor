# Configuration file

general {

    ##########################################################################################################
    # general_settings
    #--------------------------------------------------------------------------------------------------------#
    # General
    ##########################################################################################################

    general_settings {
        # Enables the Ring of Luminosity, which provides the Glowing and Night Vision effects while equipped. [default: true]
        B:"Bauble: Ring of Luminosity"=true

        # Enables the Ring of Naga's Ward, which provides the Poison Resistance effect while equipped. [default: true]
        B:"Bauble: Ring of Naga's Ward"=true

        # Enables the Trinket of Earth, which provides the Geomancy effect while equipped. [default: true]
        B:"Bauble: Trinket of Earth"=true

        # Enables the Trinket of the Sun, which provides the Sun's Blessing effect while equipped. [default: true]
        B:"Bauble: Trinket of the Sun"=true

        # Enables a default recipe for the Ring of Naga's Ward, leave this disabled if you want to add your own recipe. [default: true]
        B:"Recipe: Trinket of Earth"=true

        # Enables a default recipe for the Trinket of the Sun, leave this disabled if you want to add your own recipe. [default: true]
        B:"Recipe: Trinket of the Sun"=true
    }

}


