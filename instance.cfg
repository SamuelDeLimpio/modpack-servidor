OverrideCommands=true
PreLaunchCommand=powershell -ExecutionPolicy Bypass -File actualizar.ps1
PreLaunchCommandLinux=chmod +x actualizar.sh && ./actualizar.sh
OverrideJava=true
JavaPath=runtime/bin/java
OverrideMemory=true
MinMem=4096
MaxMem=4096
OverrideJavaArgs=true
JvmArgs=-XX:+UseCompactObjectHeaders -XX:+UseZGC